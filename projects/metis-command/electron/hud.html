<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Metis Brain</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: rgba(5, 6, 10, 0.85); color: #e8eef7; font-family: -apple-system, system-ui, sans-serif; -webkit-app-region: drag; user-select: none; backdrop-filter: blur(20px); }
      .wrap { display: flex; flex-direction: column; gap: 8px; padding: 10px 12px; height: 100%; }
      .row { display: flex; align-items: center; gap: 8px; }
      .title { font-size: 9px; letter-spacing: .26em; text-transform: uppercase; color: #fbbf24; font-weight: 800; }
      .pill { font-size: 9px; padding: 2px 6px; border-radius: 999px; background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid rgba(148,163,184,0.2); -webkit-app-region: no-drag; }
      .pill.live { color: #34d399; border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.1); }
      .pill.thinking { color: #34d3ff; border-color: rgba(52,211,255,0.4); background: rgba(52,211,255,0.1); }
      .pill.listening { color: #fbbf24; border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.1); }
      button { -webkit-app-region: no-drag; cursor: pointer; }
      .mic { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(148,163,184,0.25); background: rgba(0,0,0,0.45); color: #e8eef7; display: flex; align-items: center; justify-content: center; font-size: 14px; }
      .mic.listening { background: rgba(251,191,36,0.18); border-color: rgba(251,191,36,0.5); color: #fbbf24; }
      .input { flex: 1; -webkit-app-region: no-drag; border: 1px solid rgba(148,163,184,0.2); background: rgba(0,0,0,0.4); color: #fff; border-radius: 8px; padding: 6px 8px; font-size: 11px; outline: none; }
      .input:focus { border-color: rgba(251,191,36,0.4); }
      .reply { -webkit-app-region: no-drag; flex: 1; overflow-y: auto; font-size: 11px; line-height: 1.4; color: #cbd5e1; padding: 4px 0; }
      .meta { font-size: 9px; color: #64748b; margin-top: auto; -webkit-app-region: no-drag; }
      .close { -webkit-app-region: no-drag; background: transparent; border: none; color: #475569; font-size: 14px; line-height: 1; padding: 0 4px; }
      .close:hover { color: #fb7185; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <span class="title">Metis Brain</span>
        <span id="status" class="pill">idle</span>
        <div style="flex:1"></div>
        <button class="close" id="close" title="hide (⌘⇧J)">✕</button>
      </div>
      <div class="reply" id="reply"></div>
      <div class="row">
        <button id="mic" class="mic" title="hold space, or click">🎤</button>
        <input id="input" class="input" placeholder="ask Metis Brain…" autofocus />
        <button id="send" class="mic" style="font-size:13px" title="send">↵</button>
      </div>
      <div class="meta" id="meta">⌘⇧J toggle · hold Space to dictate</div>
    </div>
    <script>
      const replyEl = document.getElementById('reply')
      const inputEl = document.getElementById('input')
      const statusEl = document.getElementById('status')
      const micBtn = document.getElementById('mic')
      const sendBtn = document.getElementById('send')
      const closeBtn = document.getElementById('close')
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition
      let listening = false, busy = false, rec = null

      function setStatus(s) {
        statusEl.textContent = s
        statusEl.className = 'pill ' + (s === 'listening' ? 'listening' : s === 'thinking' ? 'thinking' : s === 'live' ? 'live' : '')
      }

      async function send(text) {
        const t = (text || inputEl.value).trim()
        if (!t || busy) return
        busy = true
        setStatus('thinking')
        replyEl.textContent = ''
        inputEl.value = ''
        try {
          const r = await fetch('http://127.0.0.1:3747/api/voice/transcript', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ transcript: t, sessionId: 'app-hud', persona: 'metis-brain', auto: true }),
          })
          const data = await r.json()
          if (!r.ok) replyEl.textContent = '⚠ ' + (data.error || r.statusText)
          else replyEl.textContent = data.reply || '(no reply)'
        } catch (e) {
          replyEl.textContent = '⚠ ' + (e.message || 'request failed')
        } finally {
          busy = false
          setStatus('idle')
        }
      }

      sendBtn.addEventListener('click', () => send())
      closeBtn.addEventListener('click', () => { window.close() })
      inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send() })

      function startListening() {
        if (!SR) { replyEl.textContent = 'voice unavailable in this runtime'; return }
        try {
          rec = new SR()
          rec.lang = 'en-US'
          rec.interimResults = true
          rec.continuous = false
          let final = ''
          rec.onresult = (e) => {
            let interim = ''
            for (let i = e.resultIndex; i < e.results.length; i++) {
              const r = e.results[i]
              if (r.isFinal) final += r[0].transcript
              else interim += r[0].transcript
            }
            inputEl.value = (final + interim).trim()
          }
          rec.onerror = () => { listening = false; setStatus('idle'); micBtn.classList.remove('listening') }
          rec.onend = () => {
            listening = false; micBtn.classList.remove('listening')
            const t = final.trim(); if (t) send(t); else setStatus('idle')
          }
          rec.start()
          listening = true
          setStatus('listening')
          micBtn.classList.add('listening')
        } catch (e) {
          replyEl.textContent = '⚠ ' + e.message
        }
      }

      function stopListening() {
        try { rec && rec.stop() } catch {}
        listening = false; micBtn.classList.remove('listening')
      }

      micBtn.addEventListener('click', () => { listening ? stopListening() : startListening() })

      window.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement !== inputEl && !e.repeat) {
          e.preventDefault()
          if (!listening) startListening()
        }
      })
      window.addEventListener('keyup', (e) => {
        if (e.code === 'Space' && document.activeElement !== inputEl) {
          if (listening) stopListening()
        }
      })
    </script>
  </body>
</html>
