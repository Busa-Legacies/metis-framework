<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Métis · Dev Review</title>
    <style>
      :root {
        --cyan: #34d3ff; --amber: #f59e0b; --violet: #a78bfa; --midnight: #0b1e3f;
        --bg: #05060a; --muted: #7d8597; --text: #e8eef7;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        display: flex; align-items: center; justify-content: center; overflow: hidden;
        color: var(--text);
        font-family: "SF Mono", "Fira Code", "JetBrains Mono", ui-monospace, monospace;
        background:
          radial-gradient(circle at 18% 12%, rgba(52, 211, 255, 0.16), transparent 30%),
          radial-gradient(circle at 84% 4%, rgba(167, 139, 250, 0.14), transparent 32%),
          radial-gradient(circle at 50% 116%, rgba(245, 158, 11, 0.07), transparent 42%),
          linear-gradient(135deg, #05060a 0%, #080b13 45%, #030409 100%);
      }
      body::before {
        content: ""; position: fixed; inset: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at 50% 45%, #000 30%, transparent 75%);
      }
      .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
      .mark { width: 122px; height: 122px; }
      .edge {
        fill: none; stroke: #21456b; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round;
        stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.95s ease forwards 0.95s;
      }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .node { opacity: 0; transform-box: fill-box; transform-origin: center;
              animation: pop 0.5s cubic-bezier(0.2, 1.4, 0.4, 1) forwards, tw 1.8s ease-in-out infinite; }
      @keyframes pop { 0% { opacity: 0; transform: scale(0); } 60% { opacity: 1; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
      @keyframes tw { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      .n1 { animation-delay: 0.20s, 1.9s; } .n2 { animation-delay: 0.36s, 2.0s; }
      .n3 { animation-delay: 0.52s, 2.1s; } .n4 { animation-delay: 0.68s, 2.2s; }
      .n5 { animation-delay: 0.84s, 2.3s; }
      .id { text-align: center; }
      .word { font-size: 17px; letter-spacing: 0.40em; text-indent: 0.40em; text-transform: uppercase;
              font-weight: 800; color: var(--cyan); opacity: 0; transform: translateY(6px);
              animation: rise 0.6s ease forwards 1.6s; }
      .sub { margin-top: 8px; font-size: 10px; letter-spacing: 0.30em; text-indent: 0.30em; text-transform: uppercase;
             color: var(--muted); opacity: 0; animation: rise 0.6s ease forwards 1.8s; }
      @keyframes rise { to { opacity: 1; transform: none; } }
      .bar { width: 180px; height: 3px; border-radius: 3px; background: rgba(148, 163, 184, 0.12);
             overflow: hidden; opacity: 0; animation: rise 0.5s ease forwards 2.0s; }
      .bar i { display: block; height: 100%; width: 100%; border-radius: 3px; background: var(--amber);
               transform-origin: center; animation: pulse 2.1s ease-in-out infinite 2.2s; }
      @keyframes pulse { 0%, 100% { opacity: 0.28; transform: scaleX(0.5); } 50% { opacity: 1; transform: scaleX(1); } }
      .boot { width: 290px; min-height: 78px; font-size: 11px; line-height: 1.85; color: var(--muted); }
      .boot p { opacity: 0; animation: rise 0.45s ease forwards; }
      .boot p:nth-child(1) { animation-delay: 2.10s; } .boot p:nth-child(2) { animation-delay: 2.45s; }
      .boot p:nth-child(3) { animation-delay: 2.80s; } .boot p:nth-child(4) { animation-delay: 3.15s; }
      .arrow { color: var(--cyan); opacity: 0.6; } .ok { color: var(--cyan); } .go { color: var(--amber); font-weight: 700; }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; } .edge { stroke-dashoffset: 0; }
        .node, .word, .sub, .bar, .boot p { opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="mark" viewBox="0 0 96 96" fill="none" aria-label="Métis Dev Review">
        <polyline class="edge" points="22,78 28,20 48,54 68,20 74,78" />
        <circle class="node n1" cx="22" cy="78" r="2.8" fill="#34d3ff" />
        <circle class="node n2" cx="28" cy="20" r="2.8" fill="#34d3ff" />
        <circle class="node n3" cx="48" cy="54" r="3.8" fill="#f59e0b" />
        <circle class="node n4" cx="68" cy="20" r="2.8" fill="#34d3ff" />
        <circle class="node n5" cx="74" cy="78" r="2.8" fill="#34d3ff" />
      </svg>
      <div class="id">
        <div class="word">Métis</div>
        <div class="sub">code review console</div>
      </div>
      <div class="bar"><i></i></div>
      <div class="boot">
        <p><span class="arrow">&rsaquo;</span> initializing review console</p>
        <p><span class="arrow">&rsaquo;</span> loading diff + annotation engine</p>
        <p><span class="arrow">&rsaquo;</span> overlay <span class="ok">online</span></p>
        <p><span class="arrow">&rsaquo;</span> <span class="go">ready</span></p>
      </div>
    </div>
  </body>
</html>
