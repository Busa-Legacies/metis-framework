<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>OpenClaw — Morph Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ------------------------------------------------------------------ *
 * Morph deck — web equivalent of hmpt's "FOREST" technique.
 * Mechanic: View Transitions API gives shared elements a
 * `view-transition-name`; when the DOM updates inside
 * document.startViewTransition(), those elements MORPH between their
 * old and new position/size — the browser-native twin of PowerPoint's
 * `morph option="byObject"`. Pinned anchors (brand, nav labels, page
 * credit) have no transition-name, so they hold dead still while the
 * hero, the active-nav bar, and the orb travel.
 * Re-skinned to the house dark-terminal / indigo aesthetic.
 * ------------------------------------------------------------------ */
:root{
  --bg:#0a0b0f; --surface:#14161d; --surface2:#1b1e27; --surface3:#232733;
  --line:#2b303c; --text:#e7e9ee; --muted:#9aa0ad; --faint:#5b616e;
  --accent:#818cf8; --accent2:#6366f1; --accent3:#a78bfa; --warm:#f0a35e;
  --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  --stageW:min(1180px, 94vw); --stageH:min(663px, 92vh);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:radial-gradient(120% 120% at 70% -10%, #11131b 0%, var(--bg) 55%) fixed;
  color:var(--text); font-family:var(--mono);
  display:grid; place-items:center; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ---- Stage: the 16:9 frame on desktop, full-bleed on mobile ---- */
#stage{
  position:relative; width:var(--stageW); height:var(--stageH);
  background:linear-gradient(180deg, var(--surface) 0%, #0d0f15 100%);
  border:1px solid var(--line); border-radius:18px; overflow:hidden;
  box-shadow:0 0 0 1px #00000040, 0 40px 120px -40px #000;
}
/* top-edge highlight (dark-surface elevation trick from design-guidelines) */
#stage::before{content:""; position:absolute; inset:0 0 auto 0; height:1px;
  background:linear-gradient(90deg, transparent, #ffffff22 40%, #ffffff10 60%, transparent);}

/* ---- Layered silhouette backdrop (the all-vector "depth" lesson) ---- */
.backdrop{position:absolute; inset:0; overflow:hidden; pointer-events:none}
.orb{position:absolute; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #aab2ff 0%, var(--accent2) 45%, #3b2f8f 80%, transparent 100%);
  filter:blur(2px); box-shadow:0 0 120px 30px #6366f155;
  view-transition-name:orb;}
.ridge{position:absolute; left:-5%; width:110%; bottom:0;
  background:var(--c); opacity:var(--o,1);}
.r1{height:46%; clip-path:polygon(0 60%,12% 40%,26% 55%,40% 30%,55% 50%,70% 28%,84% 48%,100% 34%,100% 100%,0 100%); --c:#1b2030;}
.r2{height:38%; clip-path:polygon(0 70%,15% 52%,30% 64%,46% 44%,62% 60%,78% 42%,92% 58%,100% 48%,100% 100%,0 100%); --c:#141826;}
.r3{height:30%; clip-path:polygon(0 78%,20% 62%,38% 74%,55% 58%,72% 72%,88% 60%,100% 70%,100% 100%,0 100%); --c:#0e111b;}
.grid-floor{position:absolute; inset:auto 0 0 0; height:34%;
  background:
    linear-gradient(180deg, transparent, #0a0b0f 88%),
    repeating-linear-gradient(90deg, #818cf81a 0 1px, transparent 1px 64px),
    repeating-linear-gradient(0deg,  #818cf814 0 1px, transparent 1px 48px);
  mask-image:linear-gradient(180deg, transparent, #000 60%);}

/* ---- Pinned anchors (stay identical every slide => rock steady) ---- */
.anchor{position:absolute; z-index:5}
.menu{top:22px; left:26px; display:flex; flex-direction:column; gap:5px; cursor:default}
.menu i{display:block; height:2px; background:var(--muted); border-radius:2px}
.menu i:nth-child(1){width:22px} .menu i:nth-child(2){width:15px} .menu i:nth-child(3){width:19px}
.brand{top:18px; left:60px; font-size:13px; letter-spacing:.32em; color:var(--muted); font-weight:700}
.pill-btn{top:18px; right:24px; padding:7px 16px; border:1px solid var(--line);
  border-radius:999px; background:var(--surface2); color:var(--muted);
  font-size:11px; letter-spacing:.18em; text-transform:uppercase}
.credit{right:26px; bottom:24px; font-size:11px; letter-spacing:.16em; color:var(--faint)}
.pageno{left:26px; bottom:18px; font-size:clamp(30px,5vw,52px); font-weight:800;
  color:#ffffff14; letter-spacing:-.02em; view-transition-name:pageno;}

/* ---- Bottom nav row: 4 items, pinned (never move) + travelling bar ---- */
.nav{position:absolute; left:0; right:0; bottom:18px; z-index:6;
  display:flex; justify-content:center; gap:clamp(14px,4vw,52px); padding:0 90px;}
.nav-item{position:relative; text-align:left; cursor:pointer; padding:8px 4px 12px;
  display:flex; flex-direction:column; gap:1px; transition:opacity .3s}
.nav-item .p{font-size:clamp(12px,1.5vw,17px); font-weight:700; letter-spacing:.02em}
.nav-item .s{font-size:10px; letter-spacing:.14em; color:var(--faint); text-transform:uppercase}
.nav-item:not(.on){opacity:.5}
.nav-item.on .p{color:var(--accent)}
.nav-bar{position:absolute; bottom:6px; height:3px; border-radius:3px;
  background:linear-gradient(90deg,var(--accent2),var(--accent3));
  box-shadow:0 0 14px 1px #818cf877; view-transition-name:navbar; transition:none;}

/* ---- Content: travelling hero + region-stable headline/body ---- */
.content{position:absolute; z-index:4; inset:0; padding:clamp(60px,9vh,96px) clamp(40px,7vw,96px);}
.hero{position:absolute; font-weight:800; letter-spacing:-.03em; line-height:.9;
  color:var(--text); view-transition-name:hero; white-space:nowrap;
  background:linear-gradient(180deg,#fff, #b9bdff 130%); -webkit-background-clip:text; background-clip:text;}
.hero .leaf{color:var(--warm); -webkit-text-fill-color:var(--warm); font-size:.5em; vertical-align:super}

/* cover layout: hero huge & centered */
#stage.cover .hero{left:50%; top:46%; transform:translate(-50%,-50%);
  font-size:clamp(54px,11vw,148px);}
#stage.cover .subtitle{position:absolute; left:50%; top:62%; transform:translateX(-50%);
  font-size:clamp(12px,1.6vw,16px); letter-spacing:.42em; color:var(--muted); text-transform:uppercase}
#stage.cover .headline,#stage.cover .body{opacity:0}

/* content layout: hero shrinks & travels up-left, copy appears */
#stage.content .hero{left:clamp(40px,7vw,96px); top:clamp(54px,9vh,86px);
  transform:none; font-size:clamp(34px,6.2vw,82px);}
#stage.content .subtitle{opacity:0}
.headline{position:absolute; left:clamp(40px,7vw,96px); top:clamp(150px,27vh,220px);
  font-size:clamp(15px,2vw,22px); color:var(--accent); letter-spacing:.04em;
  view-transition-name:headline; opacity:1; transition:opacity .4s}
.body{position:absolute; left:clamp(40px,7vw,96px); top:clamp(190px,34vh,272px);
  max-width:min(560px,70%); font-size:clamp(12.5px,1.4vw,15.5px); line-height:1.7;
  color:var(--muted); view-transition-name:body; opacity:1; transition:opacity .4s}
.body b{color:var(--text); font-weight:500}

/* click zones for prev/next */
.zone{position:absolute; top:0; bottom:64px; width:22%; z-index:7; cursor:pointer}
.zone.l{left:0} .zone.r{right:0}

/* progress dots */
.dots{position:absolute; top:20px; left:50%; transform:translateX(-50%); z-index:6;
  display:flex; gap:7px}
.dots b{width:7px; height:7px; border-radius:50%; background:#ffffff20; transition:all .3s}
.dots b.on{background:var(--accent); width:20px; border-radius:4px}

.hint{position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  font-size:11px; color:var(--faint); letter-spacing:.1em; font-family:var(--mono)}

/* ---- View Transition tuning: slow, eased morph like hmpt's 2s ---- */
::view-transition-group(*){animation-duration:.9s; animation-timing-function:cubic-bezier(.65,0,.18,1)}
::view-transition-old(hero),::view-transition-new(hero),
::view-transition-old(headline),::view-transition-new(headline),
::view-transition-old(body),::view-transition-new(body){animation-duration:.7s}
::view-transition-old(orb),::view-transition-new(orb){animation-duration:1.1s}

/* ---- Mobile: full-bleed vertical, frame fills the screen ---- */
@media (max-width:760px){
  :root{--stageW:100vw; --stageH:100dvh}
  #stage{border-radius:0; border:none}
  .nav{padding:0 18px; gap:10px; bottom:max(18px,env(safe-area-inset-bottom))}
  .nav-item .p{font-size:13px} .nav-item .s{font-size:9px}
  .body{max-width:86%}
  #stage.cover .hero{font-size:18vw}
  .hint{display:none}
  .zone{bottom:90px}
}
@media (prefers-reduced-motion:reduce){::view-transition-group(*){animation-duration:.01s}}
</style>
</head>
<body>
<div id="stage" class="cover">
  <!-- backdrop -->
  <div class="backdrop">
    <div class="orb" id="orb"></div>
    <div class="ridge r1"></div><div class="ridge r2"></div><div class="ridge r3"></div>
    <div class="grid-floor"></div>
  </div>

  <!-- pinned anchors -->
  <div class="anchor menu"><i></i><i></i><i></i></div>
  <div class="anchor brand">OPENCLAW</div>
  <div class="anchor pill-btn">v2026.5</div>
  <div class="anchor credit">metis&nbsp;os</div>
  <div class="anchor pageno" id="pageno">00</div>
  <div class="dots" id="dots"></div>

  <!-- content -->
  <div class="content">
    <div class="hero" id="hero">OPENCLAW</div>
    <div class="subtitle" id="subtitle">infrastructure overview</div>
    <div class="headline" id="headline"></div>
    <div class="body" id="body"></div>
  </div>

  <!-- bottom nav (pinned labels + travelling bar) -->
  <div class="nav" id="nav">
    <div class="nav-bar" id="navbar"></div>
  </div>

  <!-- nav zones -->
  <div class="zone l" id="zl"></div>
  <div class="zone r" id="zr"></div>
</div>
<div class="hint">← → / swipe / click&nbsp;&nbsp;·&nbsp;&nbsp;tap a section</div>

<script>
/* ---- Deck content. Slide 0 = cover; 1..4 map to the 4 nav items. ---- */
const NAV = [
  {p:'gateway', s:'core'},
  {p:'agents',  s:'jay'},
  {p:'sandbox', s:'docker'},
  {p:'dash',    s:'ui'},
];
const SLIDES = [
  { hero:'OPENCLAW', sub:'infrastructure overview', cover:true, orb:{t:'18%',l:'58%',d:'300px'} },
  { hero:'gateway', head:'about the gateway', orb:{t:'-12%',l:'72%',d:'260px'},
    body:'The always-on <b>gateway</b> brokers every request — Discord, CLI, and node services route through one process. Running <b>v2026.5.27</b> with the Docker sandbox enabled and the <b>jarry_assist_bot</b> live.' },
  { hero:'agents', head:'about the agents', orb:{t:'40%',l:'-8%',d:'320px'},
    body:'<b><<MACHINE_1_ID>></b> orchestrates five local Ollama lanes — forge, scout, shield, echo, main — all on <b>qwen3-coder:30b</b>. Claude Code is the applier; <<MACHINE_1_ID>> generates for free. A ROLE × ENGINE ladder picks the cheapest model that will succeed.' },
  { hero:'sandbox', head:'about the sandbox', orb:{t:'8%',l:'80%',d:'240px'},
    body:'Code runs <b>isolated</b> in a Docker sandbox before it ever touches the host. Agents check out work to git worktrees, so parallel sessions never collide on the same tree.' },
  { hero:'dash', head:'about the dashboard', orb:{t:'52%',l:'60%',d:'300px'},
    body:'A FastAPI + xterm.js control surface — live PTY terminal, mobile keyboard toolbar, and a single <b>/api/all</b> field contract smoke-tested on every restart. Personal integrations land in a local SQLite store.' },
];

const stage=document.getElementById('stage');
const hero=document.getElementById('hero'), subtitle=document.getElementById('subtitle');
const headline=document.getElementById('headline'), body=document.getElementById('body');
const pageno=document.getElementById('pageno'), orb=document.getElementById('orb');
const navEl=document.getElementById('nav'), navbar=document.getElementById('navbar');
const dotsEl=document.getElementById('dots');
let idx=0;

/* build nav items (pinned labels) */
NAV.forEach((n,i)=>{
  const d=document.createElement('div'); d.className='nav-item'; d.dataset.i=i+1;
  d.innerHTML=`<span class="p">${n.p}</span><span class="s">${n.s}</span>`;
  d.onclick=()=>go(i+1); navEl.appendChild(d);
});
/* build dots */
SLIDES.forEach((_,i)=>{const b=document.createElement('b'); b.onclick=()=>go(i); dotsEl.appendChild(b);});

function render(){
  const s=SLIDES[idx];
  stage.classList.toggle('cover', !!s.cover);
  stage.classList.toggle('content', !s.cover);
  hero.innerHTML = s.cover ? s.hero : `${s.hero}<span class="leaf">◆</span>`;
  subtitle.textContent = s.sub||'';
  headline.textContent = s.head||'';
  body.innerHTML = s.body||'';
  pageno.textContent = String(idx).padStart(2,'0');
  // orb travel
  if(s.orb){orb.style.width=orb.style.height=s.orb.d; orb.style.top=s.orb.t; orb.style.left=s.orb.l;}
  // nav active state + travelling bar
  const items=[...navEl.querySelectorAll('.nav-item')];
  items.forEach((it,i)=> it.classList.toggle('on', (i+1)===idx));
  const active=items[idx-1];
  if(active){
    const r=active.getBoundingClientRect(), nr=navEl.getBoundingClientRect();
    navbar.style.opacity='1';
    navbar.style.left=(r.left-nr.left)+'px';
    navbar.style.width=r.width+'px';
  } else { navbar.style.opacity='0'; }
  // dots
  [...dotsEl.children].forEach((b,i)=>b.classList.toggle('on', i===idx));
}

function go(n){
  n=Math.max(0, Math.min(SLIDES.length-1, n));
  if(n===idx) return;
  if(document.startViewTransition){
    document.startViewTransition(()=>{ idx=n; render(); });
  } else { idx=n; render(); }
}
const next=()=>go(idx+1), prev=()=>go(idx-1);

/* controls */
document.getElementById('zr').onclick=next;
document.getElementById('zl').onclick=prev;
addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();next();}
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
  if(e.key==='Home')go(0); if(e.key==='End')go(SLIDES.length-1);
});
let tx=0;
addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>45){dx<0?next():prev();}},{passive:true});
addEventListener('resize',render);

render();
</script>
</body>
</html>
