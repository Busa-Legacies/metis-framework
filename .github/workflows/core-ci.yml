name: core-ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: core-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install ruff
      - name: Lint (ruff)
        run: ruff check scripts || true   # advisory until core is lint-clean
      - name: Compile all core Python
        run: |
          python -m compileall -q scripts config build || exit 1
      - name: Core self-tests
        run: |
          python scripts/test-self-heal.py
          python scripts/test-governance-core.py
          python scripts/test-ai-merge-resolver.py
          python scripts/test-infra-config.py
      - name: Parameterization guard (no personal values in core)
        run: |
          set -e
          # Fail if a real personal value leaks into the framework core: Tailscale IPs,
          # home paths, machine hostnames, or machine PERSONA names (Jay/Jarry/Hearth/
          # Outpost — all scrubbed to <<MACHINE_N_ID>> placeholders at publish).
          # Excluded: build/ + .github/ (the tooling that *defines* these patterns) and
          # SPLIT.md (documents them). Lane role names (smith/scout/...) are intentional.
          if grep -rEIn -e '100\.82\.81\.93' -e '100\.80\.166\.77' \
                 -e '/Users/Ant' -e '/Users/abusa' \
                 -e 'antfox-macbook' -e 'anthonys-macbook-pro' \
                 -e '\b(Jay|Jarry|Hearth|Outpost)\b' \
                 -e '\b(antfox|jarry|abusa)\b' \
                 --exclude-dir=.git --exclude-dir=build \
                 --exclude-dir=.github --exclude=SPLIT.md . ; then
            echo "::error::personal value (IP/path/hostname/persona) leaked into core — parameterize it"; exit 1
          fi
          echo "clean: no IPs, home paths, hostnames, or persona names in framework core"
