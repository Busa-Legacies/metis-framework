name: Baseline CI

"on":
  pull_request:

permissions:
  contents: read

concurrency:
  group: baseline-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      trading: ${{ steps.filter.outputs.trading }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      metis_command: ${{ steps.filter.outputs.metis_command }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail
          files="$(git diff --name-only '${{ github.event.pull_request.base.sha }}' '${{ github.event.pull_request.head.sha }}')"
          printf '%s\n' "$files"

          changed() {
            local pattern
            for pattern in "$@"; do
              if grep -Eq "$pattern" <<<"$files"; then
                echo true
                return
              fi
            done
            echo false
          }

          workflow='^\.github/workflows/baseline-ci\.yml$'
          echo "trading=$(changed '^projects/trading-bot/' '^pyproject\.toml$' "$workflow")" >> "$GITHUB_OUTPUT"
          echo "dashboard=$(changed '^projects/dashboard/' "$workflow")" >> "$GITHUB_OUTPUT"
          echo "metis_command=$(changed '^projects/metis-command/' "$workflow")" >> "$GITHUB_OUTPUT"

  trading-bot:
    name: Trading bot pytest
    needs: changes
    if: needs.changes.outputs.trading == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/trading-bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: projects/trading-bot/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install pytest -r requirements.txt
      - run: PYTHONPATH=. pytest tests research/tests

  dashboard-contract:
    name: Dashboard contract
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: projects/dashboard/requirements.txt
      - run: python -m venv .venv
      - run: . .venv/bin/activate && python -m pip install --upgrade pip
      - run: . .venv/bin/activate && pip install -r requirements.txt
      - run: . .venv/bin/activate && python scripts/dashboard-contract.py --fast
      - run: . .venv/bin/activate && python scripts/finance-selftest.py

  metis-command:
    name: Metis Command lint/build
    needs: changes
    if: needs.changes.outputs.metis_command == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/metis-command
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projects/metis-command/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
